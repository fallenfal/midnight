{% extends "base.html" %}
{% block title %}Log in · Midnight{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <h1 class="page-heading mb-4">Log in</h1>
      <div class="card card-flat p-4">
        <form method="post" action="{% url 'tracker:login' %}">
          {% csrf_token %}
          {% if form.non_field_errors %}
            <div class="alert alert-danger border-0">{{ form.non_field_errors }}</div>
          {% endif %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field.errors }}
              {{ field }}
            </div>
          {% endfor %}
          <input type="hidden" name="next" value="{{ next|default:'' }}">
          <button type="submit" class="btn btn-midnight w-100">Sign in</button>
        </form>
        <p class="mt-3 mb-0 text-center text-muted-soft small">
          No account? <a href="{% url 'tracker:register' %}">Register</a>
        </p>
      </div>
    </div>
  </div>
{% endblock %}
