# Ubuntu 24.04 + Nginx: save as /etc/nginx/sites-available/midnight
# then: sudo ln -sf /etc/nginx/sites-available/midnight /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Replace SSL paths after: sudo certbot --nginx -d teamcafe.cloud -d www.teamcafe.cloud

upstream midnight_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name teamcafe.cloud www.teamcafe.cloud;

    location /static/ {
        alias /srv/midnight/staticfiles/;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://midnight_app;
    }
}

# Certbot will add a second server { listen 443 ssl; ... } block or modify this file.
