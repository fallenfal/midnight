# Ubuntu 24.04 + Nginx — teamcafe.cloud
# sudo cp to /etc/nginx/sites-available/midnight && ln -sf ... sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Uses 127.0.0.1 (not "localhost") so Nginx never tries IPv6 ::1 while Gunicorn listens on IPv4 only.

server {
    listen 80;
    listen [::]:80;
    server_name teamcafe.cloud www.teamcafe.cloud;

    location /static/ {
        alias /srv/midnight/staticfiles/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
